name: CI

# Read-only by default; the publish job only needs NPM_TOKEN.
permissions: read-all

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

jobs:
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      # Pinned to commit SHA to prevent supply-chain attacks via mutable tags.
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Fail CI on any moderate or higher severity vulnerability.
      - name: Audit dependencies
        run: npm audit --audit-level=moderate

      - name: Run tests
        run: npm test -- --reporter=verbose

  typecheck:
    name: Type check (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    # Typecheck on both Node versions to catch version-specific type incompatibilities.
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      # Pinned to commit SHA.
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: TypeScript type check (tests)
        run: npx tsc --noEmit --project tsconfig.test.json

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: [test, typecheck]
    if: github.event_name == 'release' && github.event.action == 'published'
    steps:
      # Pinned to commit SHA.
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      # The release tag is the single source of truth for the published
      # version. Stamp package.json from the tag *before* building so the
      # version constant injected into dist/cli.js matches what is published.
      # This removes the need to hand-bump package.json before a release.
      - name: Derive and validate version from release tag
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          if ! printf '%s' "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$'; then
            echo "::error::Release tag '$TAG' is not a valid semver version (expected vX.Y.Z)"
            exit 1
          fi
          if npm view "@tetrixdev/ai-bridge@$VERSION" version > /dev/null 2>&1; then
            echo "::error::Version $VERSION is already published to npm - bump the release tag"
            exit 1
          fi
          echo "Publishing @tetrixdev/ai-bridge@$VERSION (from tag $TAG)"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Build
        run: npm run build

      - name: Publish
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
